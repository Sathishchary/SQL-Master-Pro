<div class="admin-blog">
  <div class="page-header">
    <div>
      <h1>Blog Management</h1>
      <p>Write, upload, and edit blog posts</p>
    </div>
    <div class="header-actions">
      <input #blogFileInput type="file" accept=".md,.html,.htm" style="display:none"
        (change)="onUploadFile($any($event.target).files); blogFileInput.value = ''">
      <button mat-stroked-button [disabled]="uploading" (click)="blogFileInput.click()">
        <mat-icon>upload_file</mat-icon> {{ uploading ? 'Uploading...' : 'Upload Blog (.md/.html)' }}
      </button>
      <button mat-raised-button color="primary" (click)="newBlog()">
        <mat-icon>add</mat-icon> New Blog Post
      </button>
    </div>
  </div>

  <div class="blogs-table-card">
    <div class="table-scroll">
    <table mat-table [dataSource]="blogs" class="blogs-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let b">
          <div class="blog-title">{{ b.title }}</div>
          <div class="blog-excerpt">{{ b.excerpt }}</div>
        </td>
      </ng-container>
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let b">{{ b.category }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let b">
          <span class="status-chip" [class.published]="b.published">
            {{ b.published ? 'Published' : 'Draft' }}
          </span>
          @if (b.featured) {
            <span class="status-chip featured">Featured</span>
          }
        </td>
      </ng-container>
      <ng-container matColumnDef="reading">
        <th mat-header-cell *matHeaderCellDef>Reading Time</th>
        <td mat-cell *matCellDef="let b">{{ b.readingTimeMinutes }} min</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let b" class="actions-col">
          <div class="actions-row">
            <button mat-icon-button [matTooltip]="b.published ? 'Unpublish' : 'Publish'" class="publish-btn"
              [class.is-published]="b.published" (click)="togglePublish(b)">
              <mat-icon>{{ b.published ? 'unpublished' : 'publish' }}</mat-icon>
            </button>
            <button mat-icon-button matTooltip="View" (click)="viewBlog(b)"><mat-icon>visibility</mat-icon></button>
            <button mat-icon-button matTooltip="Edit" (click)="editBlog(b)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button matTooltip="Delete" class="delete-btn" (click)="deleteBlog(b)"><mat-icon>delete</mat-icon></button>
          </div>
          <button mat-icon-button class="actions-menu-btn" [matMenuTriggerFor]="rowMenu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #rowMenu="matMenu">
            <button mat-menu-item (click)="togglePublish(b)">
              <mat-icon>{{ b.published ? 'unpublished' : 'publish' }}</mat-icon>
              {{ b.published ? 'Unpublish' : 'Publish' }}
            </button>
            <button mat-menu-item (click)="viewBlog(b)"><mat-icon>visibility</mat-icon> View</button>
            <button mat-menu-item (click)="editBlog(b)"><mat-icon>edit</mat-icon> Edit</button>
            <button mat-menu-item (click)="deleteBlog(b)"><mat-icon class="delete-btn">delete</mat-icon> Delete</button>
          </mat-menu>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    </div>
    <mat-paginator [length]="totalElements" [pageSize]="10" [pageSizeOptions]="[10, 25, 50]"
      (page)="onPageChange($event)">
    </mat-paginator>
  </div>
</div>
