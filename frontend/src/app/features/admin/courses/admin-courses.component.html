<div class="admin-courses">
  <div class="page-header">
    <div>
      <h1>Course Management</h1>
      <p>Manage SQL learning courses</p>
    </div>
    <button mat-raised-button color="primary" (click)="newCourse()">
      <mat-icon>add</mat-icon> Add Course
    </button>
  </div>

  <div class="courses-table-card">
    <div class="table-scroll">
    <table mat-table [dataSource]="dataSource" class="courses-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let c">
          <div class="course-cell">
            <div class="course-icon" [style.background]="c.colorCode || '#667eea'">
              <mat-icon>{{ c.iconClass || 'school' }}</mat-icon>
            </div>
            <div>
              <div class="course-title">{{ c.title }}</div>
              <div class="course-desc">{{ c.shortDescription }}</div>
            </div>
          </div>
        </td>
      </ng-container>
      <ng-container matColumnDef="difficulty">
        <th mat-header-cell *matHeaderCellDef>Difficulty</th>
        <td mat-cell *matCellDef="let c">
          <span class="diff-badge" [class]="c.difficulty?.toLowerCase()">{{ c.difficulty }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="lessons">
        <th mat-header-cell *matHeaderCellDef>Lessons</th>
        <td mat-cell *matCellDef="let c">{{ c.totalLessons }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let c">
          <span class="status-chip" [class.published]="c.published">
            {{ c.published ? 'Published' : 'Draft' }}
          </span>
          @if (c.premium) {
            <span class="status-chip premium">Premium</span>
          }
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let c" class="actions-col">
          <div class="actions-row">
            <button mat-icon-button matTooltip="View" (click)="viewCourse(c)"><mat-icon>visibility</mat-icon></button>
            <button mat-icon-button matTooltip="Edit" (click)="editCourse(c)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteCourse(c)"><mat-icon>delete</mat-icon></button>
          </div>
          <button mat-icon-button class="actions-menu-btn" [matMenuTriggerFor]="rowMenu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #rowMenu="matMenu">
            <button mat-menu-item (click)="viewCourse(c)"><mat-icon>visibility</mat-icon> View</button>
            <button mat-menu-item (click)="editCourse(c)"><mat-icon>edit</mat-icon> Edit</button>
            <button mat-menu-item (click)="deleteCourse(c)"><mat-icon class="delete-icon">delete</mat-icon> Delete</button>
          </mat-menu>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    </div>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons></mat-paginator>
  </div>
</div>
