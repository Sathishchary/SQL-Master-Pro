<div class="admin-layout">
  <!-- Sidebar -->
  <nav class="admin-sidebar">
    <div class="sidebar-brand">⚡ SQL Master Pro</div>
    <div class="sidebar-label">ADMIN PANEL</div>
    <ul class="sidebar-nav">
      @for (nav of navItems; track nav.path) {
        <li>
          <a [routerLink]="nav.path" routerLinkActive="active" class="nav-item">
            <mat-icon>{{ nav.icon }}</mat-icon>
            {{ nav.label }}
            @if (nav.badge) {
              <span class="nav-badge">{{ nav.badge }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Main Content -->
  <div class="admin-main">
    <div class="admin-topbar">
      <span class="spacer"></span>
      <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="avatar-btn">
        <div class="avatar">{{ userInitials }}</div>
      </button>
      <mat-menu #profileMenu="matMenu" xPosition="before">
        <div class="menu-header" mat-menu-item disabled>
          <div class="menu-user-name">{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</div>
          <div class="menu-user-email">{{ currentUser()?.email }}</div>
        </div>
        <mat-divider></mat-divider>
        <a mat-menu-item routerLink="/profile">
          <mat-icon>account_circle</mat-icon> My Profile
        </a>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon> Logout
        </button>
      </mat-menu>
    </div>
    <div class="admin-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
