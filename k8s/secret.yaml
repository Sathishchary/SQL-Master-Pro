apiVersion: v1
kind: Secret
metadata:
  name: smp-secrets
  namespace: sql-master-pro
type: Opaque
# Values must be base64 encoded: echo -n 'value' | base64
stringData:
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_LONG_SECRET_KEY_MIN_64_CHARS"
  RAZORPAY_KEY_ID: "REPLACE_WITH_RAZORPAY_KEY_ID"
  RAZORPAY_KEY_SECRET: "REPLACE_WITH_RAZORPAY_SECRET"
  MAIL_USERNAME: "REPLACE_WITH_EMAIL"
  MAIL_PASSWORD: "REPLACE_WITH_EMAIL_APP_PASSWORD"
  GOOGLE_CLIENT_ID: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"
